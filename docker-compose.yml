services:
  nginx:
    build:
      context: ./nginx

    ports:
      - "1337:80"
    depends_on:
      - gbif-alert
    volumes:
      - static_volume:/app/staticfiles
  db:
    image: postgis/postgis:15-3.3
    platform: linux/amd64
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_PASSWORD=gbif-alert-db
      - POSTGRES_USER=gbif-alert-db
      - POSTGRES_DB=gbif-alert-db
    healthcheck:
      test: ['CMD-SHELL', 'psql -h localhost -U $${POSTGRES_USER} -c select 1 -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7.0.12
    expose:
      - 6379
  gbif-alert:
    build:
      context: .
    expose:
      - 8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - static_volume:/app/staticfiles
  rqworker:
    build:
      context: .
    entrypoint: poetry run python manage.py rqworker default
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - static_volume:/app/staticfiles

volumes:
  postgres_data:
  static_volume:
